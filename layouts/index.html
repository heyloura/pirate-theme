{{ define "main" }}
<section class="feed h-feed">
  {{ range first 3 (where .Site.Pages.ByDate.Reverse "Type" "post") }}
    {{ partial "sail.html" . }}
  {{ end }}
</section>
<p class="p-author h-card" hidden>
  <a class="p-name u-url" href="{{ .Site.BaseURL }}">{{ .Site.Params.author | default .Site.Title }}</a>
</p>
{{ end }}
