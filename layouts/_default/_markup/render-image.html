{{/* Wrap every markdown image in a polaroid figure with a pinning dagger.
     Applies everywhere markdown images render inside a sail body. */}}
{{- $alt := .PlainText -}}
{{- $title := .Title -}}
<figure class="polaroid">
  <span class="polaroid-frame">
    <img src="{{ .Destination | safeURL }}" alt="{{ $alt }}" loading="lazy" decoding="async"{{ with $title }} title="{{ . }}"{{ end }}>
  </span>
  {{ partial "photo-dagger.svg" . }}
  {{- with $title -}}
  <figcaption>{{ . }}</figcaption>
  {{- end -}}
</figure>
