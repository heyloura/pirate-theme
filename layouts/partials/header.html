<header class="site-header">
  <button class="theme-toggle" type="button" aria-label="Toggle light and dark mode" data-theme-toggle>
    <svg class="toggle-sun" viewBox="0 0 40 40" aria-hidden="true">
      <!-- Glow halo -->
      <circle cx="20" cy="20" r="13" fill="#f4c542" opacity="0.2"/>
      <!-- Sun body -->
      <circle cx="20" cy="20" r="7" fill="#f4c542"/>
      <!-- Rays (slow spin animation) -->
      <g class="sun-rays" stroke="#f4c542" stroke-width="2.2" stroke-linecap="round">
        <line x1="20" y1="3"  x2="20" y2="9"/>
        <line x1="20" y1="31" x2="20" y2="37"/>
        <line x1="3"  y1="20" x2="9"  y2="20"/>
        <line x1="31" y1="20" x2="37" y2="20"/>
        <line x1="8"  y1="8"  x2="12" y2="12"/>
        <line x1="28" y1="28" x2="32" y2="32"/>
        <line x1="8"  y1="32" x2="12" y2="28"/>
        <line x1="28" y1="12" x2="32" y2="8"/>
      </g>
    </svg>
    <svg class="toggle-moon" viewBox="0 0 40 40" aria-hidden="true">
      <!-- Craters on the moon's surface (button background becomes the moon itself in dark mode) -->
      <circle cx="14" cy="14" r="2.6" fill="#c9b488" opacity="0.55"/>
      <circle cx="26" cy="22" r="3.4" fill="#c9b488" opacity="0.45"/>
      <circle cx="17" cy="29" r="1.8" fill="#c9b488" opacity="0.5"/>
      <circle cx="29" cy="11" r="1.3" fill="#c9b488" opacity="0.4"/>
      <circle cx="9"  cy="23" r="1.4" fill="#c9b488" opacity="0.45"/>
    </svg>
  </button>

  <div class="crows-nest">
    {{ partial "crows-nest.html" . }}
    <a class="nest-sign" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    <a class="flag-pennant" href="{{ "index.xml" | relURL }}" aria-label="Subscribe via RSS">RSS</a>
  </div>

  <div class="header-mast" aria-hidden="true"></div>

  {{ partial "compass-rose.html" . }}

  {{ with .Site.Params.tagline }}
  <div class="sail-frame sail-frame--small sail-frame--tagline">
    <div class="sail-yard" aria-hidden="true"></div>
    <div class="tagline-scroll">{{ . }}</div>
  </div>
  {{ end }}
</header>
